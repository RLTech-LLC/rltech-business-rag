name: Provision Infrastructure

on:
  workflow_dispatch:
    inputs:
      location:
        description: Azure region to deploy resources into
        required: false
        default: eastus
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    environment: prod

    env:
      RESOURCE_GROUP: rg-rltech-rag-prod
      LOCATION: ${{ github.event.inputs.location || 'eastus' }}
      LOG_ANALYTICS_WORKSPACE: log-rltech-rag-prod
      CONTAINER_APP_ENV: cae-rltech-rag-prod

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: |
          az group create \
            --name "$RESOURCE_GROUP" \
            --location "$LOCATION" \
            --output none
          echo "Resource group '$RESOURCE_GROUP' is ready."

      - name: Create Log Analytics workspace
        run: |
          if az monitor log-analytics workspace show \
               --resource-group "$RESOURCE_GROUP" \
               --workspace-name "$LOG_ANALYTICS_WORKSPACE" \
               --output none 2>/dev/null; then
            echo "Log Analytics workspace '$LOG_ANALYTICS_WORKSPACE' already exists. Skipping."
          else
            az monitor log-analytics workspace create \
              --resource-group "$RESOURCE_GROUP" \
              --workspace-name "$LOG_ANALYTICS_WORKSPACE" \
              --location "$LOCATION" \
              --sku PerGB2018 \
              --retention-time 30 \
              --output none
            echo "Log Analytics workspace '$LOG_ANALYTICS_WORKSPACE' created."
          fi

      - name: Create Container Apps Environment
        run: |
          if az containerapp env show \
               --name "$CONTAINER_APP_ENV" \
               --resource-group "$RESOURCE_GROUP" \
               --output none 2>/dev/null; then
            echo "Container Apps Environment '$CONTAINER_APP_ENV' already exists. Skipping."
          else
            WORKSPACE_ID=$(az monitor log-analytics workspace show \
              --resource-group "$RESOURCE_GROUP" \
              --workspace-name "$LOG_ANALYTICS_WORKSPACE" \
              --query "customerId" \
              --output tsv)

            WORKSPACE_KEY=$(az monitor log-analytics workspace get-shared-keys \
              --resource-group "$RESOURCE_GROUP" \
              --workspace-name "$LOG_ANALYTICS_WORKSPACE" \
              --query "primarySharedKey" \
              --output tsv)

            az containerapp env create \
              --name "$CONTAINER_APP_ENV" \
              --resource-group "$RESOURCE_GROUP" \
              --location "$LOCATION" \
              --logs-workspace-id "$WORKSPACE_ID" \
              --logs-workspace-key "$WORKSPACE_KEY" \
              --output none
            echo "Container Apps Environment '$CONTAINER_APP_ENV' created."
          fi
