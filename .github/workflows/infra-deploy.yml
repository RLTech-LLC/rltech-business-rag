name: Provision Infrastructure

on:
  workflow_dispatch:
    inputs:
      location:
        description: "Primary Azure region for all resources"
        required: true
        default: "eastus2"
        type: choice
        options:
          - eastus
          - eastus2
          - westus2
          - northcentralus
          - swedencentral
          - westeurope
          - northeurope
          - uksouth
          - australiaeast
          - canadacentral
      openai_location:
        description: "Azure OpenAI region (must support gpt-4.1-mini & text-embedding-3-large)"
        required: true
        default: "eastus2"
        type: choice
        options:
          - eastus
          - eastus2
          - northcentralus
          - swedencentral
          - westeurope
          - uksouth
          - australiaeast
          - canadaeast
      doc_intel_location:
        description: "Document Intelligence region (limited availability)"
        required: true
        default: "eastus"
        type: choice
        options:
          - eastus
          - westus2
          - westeurope
          - australiaeast
      search_location:
        description: "Azure AI Search region (separate from primary region when eastus2 capacity is limited)"
        required: true
        default: "eastus"
        type: choice
        options:
          - eastus
          - eastus2
          - westus2
          - northcentralus
          - swedencentral
          - westeurope
          - northeurope
          - uksouth
          - australiaeast
          - canadacentral
      restore_cognitive_services:
        description: "Restore soft-deleted Cognitive Services accounts (use after teardown)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# GitHub Actions OIDC — no long-lived secrets needed.
# Reference: https://learn.microsoft.com/azure/developer/github/connect-from-azure
permissions:
  id-token: write
  contents: read

jobs:
  provision:
    name: Deploy Bicep to Azure
    runs-on: ubuntu-latest
    environment: prod

    outputs:
      resource_group: ${{ steps.read-outputs.outputs.resource_group }}
      registry_endpoint: ${{ steps.read-outputs.outputs.registry_endpoint }}
      backend_uri: ${{ steps.read-outputs.outputs.backend_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate using OIDC federated identity — no client secret stored.
      # Reference: https://learn.microsoft.com/azure/developer/github/connect-from-azure-oidc
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Deploy the subscription-scoped Bicep template.
      # This creates all Azure resources: OpenAI, AI Search, Blob Storage,
      # Document Intelligence, Container Apps, Container Registry, and monitoring.
      # Reference: https://learn.microsoft.com/azure/azure-resource-manager/bicep/deploy-cli
      - name: Provision infrastructure with Bicep
        run: |
          az deployment sub create \
            --name "rltech-rag-infra-${{ inputs.location }}" \
            --location "${{ inputs.location }}" \
            --template-file infra/main.bicep \
            --parameters \
              environmentName="${{ vars.AZURE_ENV_NAME || 'rltech-prod' }}" \
              location="${{ inputs.location }}" \
              openAiLocation="${{ inputs.openai_location }}" \
              documentIntelligenceResourceGroupLocation="${{ inputs.doc_intel_location }}" \
              principalId="${{ vars.AZURE_PRINCIPAL_ID }}" \
              openAiHost="azure" \
              azureOpenAiDisableKeys=true \
              searchServiceLocation="${{ inputs.search_location }}" \
              searchServiceSkuName="basic" \
              searchIndexName="gptkbindex" \
              searchQueryLanguage="en-us" \
              searchQuerySpeller="lexicon" \
              searchServiceSemanticRankerLevel="free" \
              searchServiceQueryRewriting=false \
              searchFieldNameEmbedding="embedding3" \
              storageSkuName="Standard_LRS" \
              deploymentTarget="containerapps" \
              azureContainerAppsWorkloadProfile="Consumption" \
              webAppExists=false \
              appServiceSkuName="B1" \
              documentIntelligenceSkuName="S0" \
              speechServiceSkuName="S0" \
              cosmosDbSkuName="serverless" \
              defaultReasoningEffort="medium" \
              defaultRetrievalReasoningEffort="minimal" \
              useAgenticKnowledgeBase=false \
              useApplicationInsights=true \
              useVectors=true \
              useMediaDescriberAzureCU=false \
              useMultimodal=false \
              useEval=false \
              useCloudIngestion=false \
              useCloudIngestionAcls=false \
              useExistingAdlsStorage=false \
              enableLanguagePicker=false \
              useSpeechInputBrowser=false \
              useSpeechOutputBrowser=false \
              useSpeechOutputAzure=false \
              useChatHistoryBrowser=false \
              useChatHistoryCosmos=false \
              useAuthentication=false \
              enforceAccessControl=false \
              disableAppServicesAuthentication=false \
              enableGlobalDocuments=false \
              enableUnauthenticatedAccess=false \
              publicNetworkAccess="Enabled" \
              usePrivateEndpoint=false \
              useVpnGateway=false \
              bypass="AzureServices" \
              restoreCognitiveServices=${{ inputs.restore_cognitive_services }} \
              useIntegratedVectorization=false \
              useUserUpload=false \
              useLocalPdfParser=false \
              useLocalHtmlParser=false \
              useAiProject=false \
              useWebSource=false \
              useSharePointSource=false \
              ragSearchTextEmbeddings=true \
              ragSearchImageEmbeddings=true \
              ragSendTextSources=true \
              ragSendImageSources=true \
              runningOnGh="true"

      - name: Read deployment outputs
        id: read-outputs
        run: |
          OUTPUTS=$(az deployment sub show \
            --name "rltech-rag-infra-${{ inputs.location }}" \
            --query "properties.outputs" \
            --output json)

          RESOURCE_GROUP=$(echo "$OUTPUTS" | jq -r '.AZURE_RESOURCE_GROUP.value // empty')
          REGISTRY_ENDPOINT=$(echo "$OUTPUTS" | jq -r '.AZURE_CONTAINER_REGISTRY_ENDPOINT.value // empty')
          BACKEND_URI=$(echo "$OUTPUTS" | jq -r '.BACKEND_URI.value // empty')

          echo "resource_group=$RESOURCE_GROUP" >> "$GITHUB_OUTPUT"
          echo "registry_endpoint=$REGISTRY_ENDPOINT" >> "$GITHUB_OUTPUT"
          echo "backend_uri=$BACKEND_URI" >> "$GITHUB_OUTPUT"

          echo "### Infrastructure Deployment Complete :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource Group | \`$RESOURCE_GROUP\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Container Registry | \`$REGISTRY_ENDPOINT\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Application URL | $BACKEND_URI |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> **Next steps:** Run the **Deploy Application** workflow, then **Ingest Business Documents**." >> "$GITHUB_STEP_SUMMARY"
